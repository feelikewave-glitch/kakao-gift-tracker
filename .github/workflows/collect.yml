name: 카카오 선물하기 랭킹 수집

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:
    inputs:
      debug:
        description: "디버그 모드로 실행 (처음 1회 데이터 구조 확인용)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 브라우저(크로미움) 설치
        run: python -m playwright install --with-deps chromium

      - name: 랭킹 수집 실행
        run: |
          if [ "${{ inputs.debug }}" = "true" ]; then
            python collector.py --debug
          else
            python collector.py
          fi

      - name: 수집 결과 저장(커밋)
        run: |
          git config user.name  "kakao-gift-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data debug 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경 사항 없음 (저장 생략)"
          else
            git commit -m "랭킹 수집: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
