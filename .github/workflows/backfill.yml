name: 과거 그래프 채우기 (backfill)

# 수동 실행 전용 (한 번만 돌리면 됨)
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 과거 채우기 실행
        run: python backfill.py

      - name: 결과 저장(커밋)
        run: |
          git config user.name  "kakao-gift-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "과거 그래프 데이터 채우기"
            git push
          fi
